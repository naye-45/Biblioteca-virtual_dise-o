<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Préstamo</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="navbar.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        body {
            background: linear-gradient(135deg, #59bce0, #0d306d);
            display: flex;
            justify-content: center;
            align-items: flex-start;   /* ← era "center", cámbialo a "flex-start" */
            min-height: 100vh;
            padding: 30px;
            padding-top: 80px;         /* ← espacio para la navbar sticky */
        }

        .contenedor {
            width: 90%;
            max-width: 750px;
            background: #fff;
            border-radius: 18px;
            padding: 35px;          /* ← padding normal en todos los lados */
            padding-top: 35px;      /* ← reemplaza el 8rem por esto */
            box-shadow: 0 10px 30px rgba(0, 0, 0, .3);
            animation: aparecer 0.8s ease;
            margin-top: 1.5rem;     /* ← pequeño espacio desde la navbar */
            margin-bottom: 2rem;    /* ← espacio al fondo */
        }

        @keyframes aparecer {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            text-align: center;
            color: #1e3c72;
            margin-bottom: 10px;
        }

        p {
            text-align: center;
            color: gray;
            margin-bottom: 25px;
        }

        .fila {
            display: flex;
            gap: 15px;
        }

        .grupo {
            flex: 1;
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            transition: .3s;
            font-size: 15px;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #2a5298;
            box-shadow: 0 0 8px rgba(42, 82, 152, .3);
        }

        textarea {
            resize: none;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            background: #1e3c72;
            color: white;
            font-size: 17px;
            border-radius: 8px;
            cursor: pointer;
            transition: .3s;
        }

        button:hover {
            background: #2a5298;
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, .2);
        }

        button:active {
            transform: scale(.98);
        }

        @media(max-width:700px) {
            .fila {
                flex-direction: column;
            }
        }
    </style>

</head>

<header>
        <nav class="navbar">
            <div class="logo">
                <span>Biblioteca Virtual</span>
            </div>

            <ul class="nav-links">
    <li><a href="index.html">Inicio</a></li>
    <li><a href="catalogo.html">Catálogo de Libros</a></li>
    <li><a href="prestamos.html">Préstamos</a></li>
    <li><a href="contactos.html">Contactos</a></li>
    <li><a class="login-btn" href="login/login.html">Iniciar Sesión</a></li>
</ul>
            </ul>
        </nav>
    </header>
<body>

    <div class="contenedor">

        <h1>📚 Solicitud de Préstamo</h1>

        <p>Complete el siguiente formulario para solicitar un libro.</p>

        <form>

            <div class="fila">

                <div class="grupo">
                    <label>Nombre completo</label>
                    <input type="text" placeholder="Ingrese su nombre" required>
                </div>

                <div class="grupo">
                    <label>Cédula</label>
                    <input type="text" placeholder="Ingrese su cédula" required>
                </div>

            </div>

            <div class="fila">

                <div class="grupo">
                    <label>Correo electrónico</label>
                    <input type="email" placeholder="ejemplo@gmail.com" required>
                </div>

                <div class="grupo">
                    <label>Teléfono</label>
                    <input type="tel" placeholder="0999999999">
                </div>

            </div>

            <div class="grupo">

                <label>Seleccione el libro</label>

                <select required>
                    <option value="">-- Seleccione --</option>
                    <option>Don Quijote de la Mancha</option>
                    <option>Cien años de soledad</option>
                    <option>El Principito</option>
                    <option>1984</option>
                    <option>La Odisea</option>
                </select>

            </div>

            <div class="fila">

                <div class="grupo">
                    <label>Fecha de préstamo</label>
                    <input type="date" required>
                </div>

                <div class="grupo">
                    <label>Días de préstamo</label>

                    <select>
                        <option>7 días</option>
                        <option>15 días</option>
                        <option>30 días</option>
                    </select>

                </div>

            </div>

            <div class="grupo">

                <label>Observaciones</label>

                <textarea rows="4"
                    placeholder="Escriba aquí cualquier observación adicional..."></textarea>

            </div>

            <button type="submit">
                📖 Registrar Préstamo
            </button>

        </form>

    </div>

</body>

</html>
