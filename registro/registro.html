<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca Virtual - Login</title>
    <link rel="stylesheet" href="/registro/registro.css">
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
   <div class="registro-container">

        <div class="registro-card">

            <div class="logo">
                <i class="fa-solid fa-book-open-reader"></i>
            </div>

            <h1>Biblioteca Virtual</h1>

            <p class="subtitle">
               Registrate gratis
            </p>

            <form id="registroForm">

                <div class="input-group">
                    <i class="fa-solid fa-user"></i>
                    <input
                        type="text"
                        id="username"
                        placeholder="Usuario"
                        required
                    >
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input
                        type="password"
                        id="password"
                        placeholder="Contraseña"
                        required
                    >
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input
                        type="password"
                        id="repetir_contraseña"
                        placeholder="Repetir contraseña"
                        required
                    >
                </div>
                
                <button class="btn btn-primary" type="submit" id="sumbit">Registrarse</button>
             
                
            </form>

            <p id="mensaje"></p>

        </div>

    </div>
</body>
<script src="/registro/registro.js"></script>
</html>
